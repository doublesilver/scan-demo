<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스트랩 DB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #1a2332;
        --navy-light: #243044;
        --navy-muted: #2d3f55;
        --orange: #e8734a;
        --orange-light: #f08a66;
        --off-white: #f5f5f3;
        --white: #ffffff;
        --gray-100: #f0f0ee;
        --gray-200: #e2e2df;
        --gray-400: #9b9b96;
        --gray-600: #5c5c58;
        --sidebar-w: 240px;
      }

      body {
        font-family: "Noto Sans KR", "DM Sans", sans-serif;
        background: var(--off-white);
        color: var(--navy);
        min-height: 100vh;
      }

      /* LAYOUT */
      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
        background: var(--navy);
        color: var(--white);
        display: flex;
        flex-direction: column;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--navy-muted) transparent;
      }

      .sidebar-logo {
        padding: 20px 16px 16px;
        border-bottom: 1px solid var(--navy-muted);
      }

      .sidebar-logo h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-dot {
        width: 8px;
        height: 8px;
        background: var(--orange);
        border-radius: 50%;
        flex-shrink: 0;
      }

      .total-badge {
        display: inline-block;
        background: var(--orange);
        color: var(--white);
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 10px;
        margin-top: 6px;
      }

      .sidebar-section {
        padding: 12px 0 4px;
      }

      .sidebar-section-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--gray-400);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 0 16px 6px;
      }

      .cat-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 16px;
        cursor: pointer;
        border-radius: 0;
        transition: background 0.15s;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
      }

      .cat-item:hover {
        background: var(--navy-light);
        color: var(--white);
      }

      .cat-item.active {
        background: var(--orange);
        color: var(--white);
      }

      .cat-count {
        font-size: 11px;
        background: rgba(255, 255, 255, 0.12);
        padding: 1px 6px;
        border-radius: 8px;
      }

      .cat-item.active .cat-count {
        background: rgba(255, 255, 255, 0.25);
      }

      .sidebar-divider {
        height: 1px;
        background: var(--navy-muted);
        margin: 8px 16px;
      }

      .filter-group {
        padding: 4px 16px 8px;
      }

      .filter-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        padding: 4px 0;
        transition: color 0.15s;
      }

      .filter-group label:hover {
        color: var(--white);
      }

      .filter-group input[type="checkbox"] {
        accent-color: var(--orange);
        width: 13px;
        height: 13px;
        flex-shrink: 0;
      }

      .reset-btn {
        margin: 8px 16px 16px;
        padding: 8px 12px;
        background: transparent;
        border: 1px solid var(--navy-muted);
        color: rgba(255, 255, 255, 0.5);
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        width: calc(100% - 32px);
        transition: all 0.15s;
      }

      .reset-btn:hover {
        border-color: var(--orange);
        color: var(--orange);
      }

      /* MAIN */
      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      /* HEADER */
      .header {
        background: var(--navy);
        padding: 24px 28px 20px;
        color: var(--white);
      }

      .stats-row {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: var(--navy-light);
        border-radius: 10px;
        padding: 12px 18px;
        flex: 1;
      }

      .stat-label {
        font-size: 11px;
        color: var(--gray-400);
        font-weight: 500;
        letter-spacing: 0.04em;
      }

      .stat-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--white);
        font-family: "DM Sans", sans-serif;
        line-height: 1.2;
      }

      .stat-value span {
        font-size: 13px;
        font-weight: 400;
        color: var(--gray-400);
      }

      .search-wrap {
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray-400);
        pointer-events: none;
      }

      #searchInput {
        width: 100%;
        padding: 10px 14px 10px 38px;
        background: var(--navy-light);
        border: 1px solid var(--navy-muted);
        border-radius: 8px;
        color: var(--white);
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }

      #searchInput::placeholder {
        color: var(--gray-400);
      }
      #searchInput:focus {
        border-color: var(--orange);
      }

      /* FILTER BAR */
      .filter-bar {
        background: var(--white);
        border-bottom: 1px solid var(--gray-200);
        padding: 10px 28px;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 46px;
        flex-wrap: wrap;
      }

      .filter-info {
        font-size: 13px;
        color: var(--gray-600);
      }

      .filter-info strong {
        color: var(--navy);
        font-weight: 600;
      }

      .active-filters {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        flex: 1;
      }

      .filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--navy);
        color: var(--white);
        font-size: 11px;
        padding: 3px 8px 3px 10px;
        border-radius: 12px;
        cursor: pointer;
      }

      .filter-chip:hover {
        background: var(--orange);
      }

      .chip-x {
        font-size: 13px;
        line-height: 1;
        opacity: 0.7;
      }

      /* GRID */
      .grid-wrap {
        padding: 20px 28px 40px;
        flex: 1;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      /* CARD */
      .card {
        background: var(--white);
        border-radius: 12px;
        padding: 18px;
        cursor: pointer;
        border: 1.5px solid transparent;
        transition:
          transform 0.18s,
          box-shadow 0.18s,
          border-color 0.18s;
        position: relative;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(26, 35, 50, 0.12);
        border-color: var(--orange);
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .cat-badge {
        font-size: 10px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 6px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .size-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 3px 7px;
        border-radius: 6px;
        background: var(--gray-100);
        color: var(--gray-600);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .card-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--navy);
        line-height: 1.4;
        margin-bottom: 10px;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 8px;
      }

      .tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--gray-100);
        color: var(--gray-600);
      }

      .tag.material {
        background: #e8f4fd;
        color: #1a5276;
      }
      .tag.fastening {
        background: #fef9e7;
        color: #7d6608;
      }

      .colors-text {
        font-size: 11px;
        color: var(--gray-400);
        margin-top: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* SKELETON */
      .skeleton {
        background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 12px;
        height: 140px;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* EMPTY STATE */
      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 20px;
        color: var(--gray-400);
      }

      .empty-state .icon {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .empty-state p {
        font-size: 15px;
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 35, 50, 0.55);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }

      .modal-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal {
        background: var(--white);
        border-radius: 16px;
        width: 100%;
        max-width: 520px;
        max-height: 85vh;
        overflow-y: auto;
        transform: scale(0.95) translateY(10px);
        transition: transform 0.2s;
      }

      .modal-overlay.open .modal {
        transform: scale(1) translateY(0);
      }

      .modal-header {
        padding: 24px 24px 16px;
        border-bottom: 1px solid var(--gray-200);
        position: sticky;
        top: 0;
        background: var(--white);
        z-index: 1;
      }

      .modal-header h2 {
        font-size: 18px;
        font-weight: 700;
        color: var(--navy);
        line-height: 1.4;
      }

      .modal-close {
        position: absolute;
        right: 20px;
        top: 20px;
        background: var(--gray-100);
        border: none;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gray-600);
      }

      .modal-close:hover {
        background: var(--gray-200);
      }

      .modal-body {
        padding: 20px 24px 24px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 100px 1fr;
        gap: 10px 12px;
      }

      .detail-key {
        font-size: 12px;
        color: var(--gray-400);
        font-weight: 500;
        padding-top: 1px;
      }

      .detail-val {
        font-size: 13px;
        color: var(--navy);
        word-break: break-all;
      }

      .detail-val a {
        color: var(--orange);
        text-decoration: none;
      }

      .detail-val a:hover {
        text-decoration: underline;
      }

      .modal-divider {
        height: 1px;
        background: var(--gray-200);
        margin: 14px 0;
      }

      /* MOBILE FILTER DROPDOWNS */
      .mobile-filters {
        display: none;
        background: var(--navy);
        padding: 12px 16px;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mobile-select {
        padding: 7px 10px;
        background: var(--navy-light);
        border: 1px solid var(--navy-muted);
        border-radius: 6px;
        color: var(--white);
        font-size: 13px;
        outline: none;
        cursor: pointer;
      }

      /* RESPONSIVE */
      @media (max-width: 1024px) {
        .product-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .mobile-filters {
          display: flex;
        }
        .product-grid {
          grid-template-columns: 1fr;
        }
        .header {
          padding: 16px;
        }
        .grid-wrap {
          padding: 16px;
        }
        .stats-row {
          gap: 10px;
        }
        .stat-value {
          font-size: 20px;
        }
        .filter-bar {
          padding: 8px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <h1><span class="logo-dot"></span>스트랩 DB</h1>
          <div class="total-badge" id="totalBadge">로딩 중...</div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-label">카테고리</div>
          <div id="catList"></div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section">
          <div class="sidebar-section-label">재질</div>
          <div class="filter-group" id="materialFilters"></div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section">
          <div class="sidebar-section-label">체결방식</div>
          <div class="filter-group" id="fasteningFilters"></div>
        </div>

        <div class="sidebar-divider"></div>

        <button class="reset-btn" id="resetBtn">필터 초기화</button>
      </aside>

      <!-- MAIN -->
      <div class="main">
        <!-- MOBILE FILTERS -->
        <div class="mobile-filters" id="mobileFilters">
          <select class="mobile-select" id="mobileCat">
            <option value="">전체 카테고리</option>
          </select>
          <select class="mobile-select" id="mobileMaterial">
            <option value="">전체 재질</option>
          </select>
          <select class="mobile-select" id="mobileFastening">
            <option value="">전체 체결방식</option>
          </select>
        </div>

        <!-- HEADER -->
        <div class="header">
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-label">총 제품</div>
              <div class="stat-value" id="statTotal">-</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">카테고리</div>
              <div class="stat-value" id="statCats">-</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">재질 종류</div>
              <div class="stat-value" id="statMaterials">-</div>
            </div>
          </div>
          <div class="search-wrap">
            <svg
              class="search-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="제품명, 재질, 체결방식으로 검색"
            />
          </div>
        </div>

        <!-- FILTER BAR -->
        <div class="filter-bar">
          <div class="filter-info">
            <strong id="resultCount">0</strong>개 제품
          </div>
          <div class="active-filters" id="activeFilters"></div>
        </div>

        <!-- GRID -->
        <div class="grid-wrap">
          <div class="product-grid" id="productGrid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h2 id="modalTitle"></h2>
          <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script>
      const CAT_COLORS = {
        "20mm 일반형": { bg: "#e8f4fd", text: "#1a5276" },
        "22mm 일반형": { bg: "#e8f8f5", text: "#1a6e4e" },
        "18mm 일반형": { bg: "#fef5e7", text: "#7d5a0a" },
        "갤럭시 울트라": { bg: "#fdebd0", text: "#784212" },
        "갤럭시 워치 8": { bg: "#f9ebea", text: "#7b241c" },
        애플워치: { bg: "#f4ecf7", text: "#6c3483" },
        미밴드: { bg: "#eaf2ff", text: "#1a4a8a" },
        미밴드10: { bg: "#d6eaf8", text: "#154360" },
        "화웨이 핏4": { bg: "#e9f7ef", text: "#1d6a3a" },
        티렉스: { bg: "#fdedec", text: "#7b241c" },
        프레스티지: { bg: "#f5eef8", text: "#5b2c6f" },
        가민: { bg: "#fdfefe", text: "#2e4057" },
        보이스캐디: { bg: "#eafaf1", text: "#1e5631" },
        커넥터: { bg: "#f2f3f4", text: "#424949" },
      };

      let allProducts = [];
      let state = {
        category: "",
        materials: new Set(),
        fastenings: new Set(),
        search: "",
      };

      function loadState() {
        const hash = location.hash.slice(1);
        if (!hash) return;
        try {
          const p = new URLSearchParams(hash);
          state.category = p.get("cat") || "";
          state.search = p.get("q") || "";
          state.materials = new Set(
            (p.get("mat") || "").split(",").filter(Boolean),
          );
          state.fastenings = new Set(
            (p.get("fas") || "").split(",").filter(Boolean),
          );
        } catch {}
      }

      function saveState() {
        const p = new URLSearchParams();
        if (state.category) p.set("cat", state.category);
        if (state.search) p.set("q", state.search);
        if (state.materials.size) p.set("mat", [...state.materials].join(","));
        if (state.fastenings.size)
          p.set("fas", [...state.fastenings].join(","));
        const s = p.toString();
        history.replaceState(null, "", s ? "#" + s : location.pathname);
      }

      function applyFilters() {
        const q = state.search.toLowerCase();
        return allProducts.filter((p) => {
          if (state.category && p.category !== state.category) return false;
          if (state.materials.size && !state.materials.has(p.material))
            return false;
          if (state.fastenings.size && !state.fastenings.has(p.fastening))
            return false;
          if (q) {
            const hay = [
              p.name,
              p.material,
              p.fastening,
              p.colors,
              p.type,
              p.compatible_models,
            ]
              .filter(Boolean)
              .join(" ")
              .toLowerCase();
            if (!hay.includes(q)) return false;
          }
          return true;
        });
      }

      function render() {
        const filtered = applyFilters();
        document.getElementById("resultCount").textContent = filtered.length;
        renderGrid(filtered);
        renderActiveFilters();
        renderCatList();
        syncCheckboxes();
        syncMobileSelects();
        saveState();
      }

      function renderGrid(products) {
        const grid = document.getElementById("productGrid");
        if (!products.length) {
          grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>`;
          return;
        }
        grid.innerHTML = products.map((p, i) => cardHTML(p, i)).join("");
        grid.querySelectorAll(".card").forEach((card) => {
          card.addEventListener("click", () =>
            openModal(parseInt(card.dataset.idx)),
          );
        });
      }

      function cardHTML(p, i) {
        const col = CAT_COLORS[p.category] || {
          bg: "#f0f0ee",
          text: "#5c5c58",
        };
        const catBadge = `<span class="cat-badge" style="background:${col.bg};color:${col.text}">${p.category}</span>`;
        const sizeBadge = p.size
          ? `<span class="size-badge">${p.size}</span>`
          : "";
        const matTag = p.material
          ? `<span class="tag material">${p.material}</span>`
          : "";
        const fasTag = p.fastening
          ? `<span class="tag fastening">${p.fastening}</span>`
          : "";
        const typeTag =
          p.type && p.type !== p.material
            ? `<span class="tag">${p.type}</span>`
            : "";
        const colorsEl = p.colors
          ? `<div class="colors-text">🎨 ${p.colors}</div>`
          : "";

        return `<div class="card" data-idx="${i}" style="animation:fadeIn .2s ${(i % 12) * 0.03}s both">
    <div class="card-top">
      ${catBadge}
      ${sizeBadge}
    </div>
    <div class="card-name">${p.name}</div>
    <div class="tag-row">${matTag}${fasTag}${typeTag}</div>
    ${colorsEl}
  </div>`;
      }

      function renderCatList() {
        const catList = document.getElementById("catList");
        const counts = {};
        allProducts.forEach((p) => {
          counts[p.category] = (counts[p.category] || 0) + 1;
        });

        const categories = ["전체", ...Object.keys(counts)];
        catList.innerHTML = categories
          .map((cat) => {
            const isAll = cat === "전체";
            const active = isAll ? !state.category : state.category === cat;
            const count = isAll ? allProducts.length : counts[cat] || 0;
            return `<div class="cat-item ${active ? "active" : ""}" data-cat="${isAll ? "" : cat}">
      <span>${cat}</span>
      <span class="cat-count">${count}</span>
    </div>`;
          })
          .join("");

        catList.querySelectorAll(".cat-item").forEach((el) => {
          el.addEventListener("click", () => {
            state.category = el.dataset.cat;
            render();
          });
        });
      }

      function buildCheckboxes(containerId, values, stateSet) {
        const el = document.getElementById(containerId);
        el.innerHTML = values
          .filter((v) => v && v !== "-")
          .map(
            (v) =>
              `<label><input type="checkbox" value="${v}" ${stateSet.has(v) ? "checked" : ""}>${v}</label>`,
          )
          .join("");
        el.querySelectorAll("input").forEach((cb) => {
          cb.addEventListener("change", () => {
            if (cb.checked) stateSet.add(cb.value);
            else stateSet.delete(cb.value);
            render();
          });
        });
      }

      function syncCheckboxes() {
        document.querySelectorAll("#materialFilters input").forEach((cb) => {
          cb.checked = state.materials.has(cb.value);
        });
        document.querySelectorAll("#fasteningFilters input").forEach((cb) => {
          cb.checked = state.fastenings.has(cb.value);
        });
      }

      function syncMobileSelects() {
        document.getElementById("mobileCat").value = state.category;
        document.getElementById("mobileMaterial").value =
          state.materials.size === 1 ? [...state.materials][0] : "";
        document.getElementById("mobileFastening").value =
          state.fastenings.size === 1 ? [...state.fastenings][0] : "";
      }

      function renderActiveFilters() {
        const el = document.getElementById("activeFilters");
        const chips = [];
        if (state.category)
          chips.push({
            label: state.category,
            remove: () => {
              state.category = "";
              render();
            },
          });
        state.materials.forEach((m) =>
          chips.push({
            label: `재질: ${m}`,
            remove: () => {
              state.materials.delete(m);
              render();
            },
          }),
        );
        state.fastenings.forEach((f) =>
          chips.push({
            label: `체결: ${f}`,
            remove: () => {
              state.fastenings.delete(f);
              render();
            },
          }),
        );
        el.innerHTML = chips
          .map(
            (c, i) =>
              `<span class="filter-chip" data-i="${i}">${c.label}<span class="chip-x">×</span></span>`,
          )
          .join("");
        el.querySelectorAll(".filter-chip").forEach((el, i) => {
          el.addEventListener("click", chips[i].remove);
        });
      }

      function openModal(idx) {
        const p = applyFilters()[idx];
        if (!p) return;

        const col = CAT_COLORS[p.category] || {
          bg: "#f0f0ee",
          text: "#5c5c58",
        };
        document.getElementById("modalTitle").textContent = p.name;

        const rows = [
          [
            "카테고리",
            `<span class="cat-badge" style="background:${col.bg};color:${col.text};font-size:12px;padding:3px 8px;border-radius:6px">${p.category}</span>`,
          ],
          p.material && ["재질", p.material],
          p.fastening && ["체결방식", p.fastening],
          p.size && ["사이즈", p.size],
          p.type && p.type !== p.material && ["구분/형태", p.type],
          p.colors && ["컬러 옵션", p.colors],
          p.compatible_models && ["호환 기종", p.compatible_models],
          p.status && [
            "상태",
            p.status === "active"
              ? '<span style="color:#1a6e4e">활성</span>'
              : '<span style="color:#7b241c">비활성</span>',
          ],
        ].filter(Boolean);

        const links = [
          p.coupang_url &&
            p.coupang_url.startsWith("http") && ["쿠팡", p.coupang_url],
          p.ss_url && p.ss_url.startsWith("http") && ["스페이스쉴드", p.ss_url],
          p.url_1688 && p.url_1688.startsWith("http") && ["1688", p.url_1688],
          p.nas_path && p.nas_path !== "링크" && ["NAS 경로", null, p.nas_path],
        ].filter(Boolean);

        const priceRow = p.price
          ? `<div class="modal-divider"></div>
    <div style="font-size:20px;font-weight:700;color:var(--orange)">${parseInt(p.price).toLocaleString()}원</div>`
          : "";

        document.getElementById("modalBody").innerHTML = `
    <div class="detail-grid">
      ${rows.map(([k, v]) => `<div class="detail-key">${k}</div><div class="detail-val">${v}</div>`).join("")}
    </div>
    ${
      links.length
        ? `<div class="modal-divider"></div>
      <div class="detail-grid">
        ${links
          .map(
            ([k, url, plain]) => `
          <div class="detail-key">${k}</div>
          <div class="detail-val">${url ? `<a href="${url}" target="_blank" rel="noopener">${url}</a>` : plain || ""}</div>
        `,
          )
          .join("")}
      </div>`
        : ""
    }
    ${priceRow}
  `;

        document.getElementById("modalOverlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
      }

      async function init() {
        loadState();

        const resp = await fetch("./full_data.json");
        const data = await resp.json();
        allProducts = data.products;

        document.getElementById("totalBadge").textContent =
          `${data.stats.total_products}개 제품`;
        document.getElementById("statTotal").innerHTML =
          `${data.stats.total_products} <span>개</span>`;
        document.getElementById("statCats").innerHTML =
          `${data.stats.tabs} <span>개</span>`;
        document.getElementById("statMaterials").innerHTML =
          `${data.stats.materials.filter((m) => m !== "-").length} <span>종</span>`;

        const counts = {};
        allProducts.forEach((p) => {
          counts[p.category] = (counts[p.category] || 0) + 1;
        });

        buildCheckboxes(
          "materialFilters",
          data.stats.materials,
          state.materials,
        );
        buildCheckboxes(
          "fasteningFilters",
          data.stats.fastenings,
          state.fastenings,
        );

        // mobile selects
        const mobileCat = document.getElementById("mobileCat");
        Object.keys(counts).forEach((cat) => {
          const o = document.createElement("option");
          o.value = cat;
          o.textContent = `${cat} (${counts[cat]})`;
          mobileCat.appendChild(o);
        });
        mobileCat.value = state.category;

        const mobileMat = document.getElementById("mobileMaterial");
        data.stats.materials
          .filter((m) => m && m !== "-")
          .forEach((m) => {
            const o = document.createElement("option");
            o.value = m;
            o.textContent = m;
            mobileMat.appendChild(o);
          });

        const mobileFas = document.getElementById("mobileFastening");
        data.stats.fastenings
          .filter((f) => f && f !== "-")
          .forEach((f) => {
            const o = document.createElement("option");
            o.value = f;
            o.textContent = f;
            mobileFas.appendChild(o);
          });

        mobileCat.addEventListener("change", () => {
          state.category = mobileCat.value;
          render();
        });
        mobileMat.addEventListener("change", () => {
          state.materials.clear();
          if (mobileMat.value) state.materials.add(mobileMat.value);
          render();
        });
        mobileFas.addEventListener("change", () => {
          state.fastenings.clear();
          if (mobileFas.value) state.fastenings.add(mobileFas.value);
          render();
        });

        document
          .getElementById("searchInput")
          .addEventListener("input", (e) => {
            state.search = e.target.value;
            render();
          });
        document.getElementById("searchInput").value = state.search;

        document.getElementById("resetBtn").addEventListener("click", () => {
          state.category = "";
          state.materials.clear();
          state.fastenings.clear();
          state.search = "";
          document.getElementById("searchInput").value = "";
          buildCheckboxes(
            "materialFilters",
            data.stats.materials,
            state.materials,
          );
          buildCheckboxes(
            "fasteningFilters",
            data.stats.fastenings,
            state.fastenings,
          );
          render();
        });

        document
          .getElementById("modalClose")
          .addEventListener("click", closeModal);
        document
          .getElementById("modalOverlay")
          .addEventListener("click", (e) => {
            if (e.target === e.currentTarget) closeModal();
          });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeModal();
        });
        window.addEventListener("popstate", () => {
          loadState();
          render();
        });

        render();
      }

      const style = document.createElement("style");
      style.textContent = `@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }`;
      document.head.appendChild(style);

      init();
    </script>
  </body>
</html>
